%YAML:1.0

#--------------------------------------------------------------------------------------------
# Camera Parameters for AMtown02 Dataset
# Derived from AMtown.yaml (camera_intrinsic & camera_dist_coeffs)
#--------------------------------------------------------------------------------------------
Camera.type: "PinHole"

# Camera calibration and distortion parameters (OpenCV)
Camera.fx: 726.86
Camera.fy: 726.64
Camera.cx: 586.09
Camera.cy: 520.89

Camera.k1: -0.1210
Camera.k2: 0.1113
Camera.p1: 0.0016
Camera.p2: 0.00013
Camera.k3: -0.062353

# 图像分辨率：必须与 rgb/ 下实际图像尺寸一致，否则易丢跟踪
# 若图像为 2448x2048，请改为 Camera.width: 2448, Camera.height: 2048，并相应缩放 fx,fy,cx,cy
Camera.width: 1280
Camera.height: 720

# Camera frames per second (approximate)
Camera.fps: 10.0

# Color order of the images (0: BGR, 1: RGB. It is ignored if grayscale)
Camera.RGB: 0

#--------------------------------------------------------------------------------------------
# ORB Parameters (tuned to track through as many images as possible, extend trajectory)
# 目标：尽量跑完全部 ~7498 帧，减少中途 Tracking lost，拉长飞行轨迹
#--------------------------------------------------------------------------------------------

# 每帧特征数：越多越稳，不易丢跟踪（航拍可适当加大）
ORBextractor.nFeatures: 3000

# 金字塔尺度与层数：层数多对尺度变化大的航拍更友好，利于长轨迹
ORBextractor.scaleFactor: 1.2
ORBextractor.nLevels: 10

# FAST 阈值：降低可在模糊/弱纹理帧也提出足够角点，减少丢帧
ORBextractor.iniThFAST: 10
ORBextractor.minThFAST: 4

#--------------------------------------------------------------------------------------------
# Viewer Parameters
#--------------------------------------------------------------------------------------------
Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1.0
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 2.0
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3.0
Viewer.ViewpointX: 0.0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -1.8
Viewer.ViewpointF: 500.0
Viewer: 0

